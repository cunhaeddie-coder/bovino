name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 2.24.75.211
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: bash /var/www/bovino/deploy/4_update.sh
