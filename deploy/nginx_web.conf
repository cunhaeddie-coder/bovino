server {
    listen 80;
    server_name bovino.agr.br www.bovino.agr.br;

    # Logs
    access_log /var/log/nginx/bovino_web_access.log;
    error_log  /var/log/nginx/bovino_web_error.log;

    # Arquivos estáticos do Next.js servidos direto do disco (sem proxy)
    location /_next/static/ {
        alias /var/www/bovino/web/.next/static/;
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Arquivos públicos (favicon, manifest, etc)
    location ~* ^/(favicon|manifest|icons|robots|sitemap) {
        root /var/www/bovino/web/public;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }
}
